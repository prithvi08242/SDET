<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Table Automation — Automation Practice</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 08 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 08</span>
  <div class="prev-next"><a href="page07.html">← 07</a><a href="page09.html">09 →</a></div>
</div>
<div class="container">
<div class="section" id="s8">
  <div class="section-header">
    <div class="section-num">08</div>
    <div><div class="section-title">Table Automation</div>
    <div class="section-desc">Read rows, sort by column, search / filter, pagination</div></div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
    <input id="table-search" type="text" placeholder="Search..." data-testid="table-search" oninput="filterTable()" style="width:200px"/>
    <button class="btn btn-ghost btn-sm" data-testid="btn-sort-name" onclick="sortTable()">Sort by Name</button>
  </div>
  <table class="ptable" id="practice-table" data-testid="practice-table">
    <thead><tr><th>Name</th><th>Department</th><th>Role</th><th>Salary</th></tr></thead>
    <tbody id="table-body"></tbody>
  </table>
  <div style="display:flex;align-items:center;gap:10px;margin-top:8px;font-size:13px">
    <button class="btn btn-ghost btn-sm" id="btn-prev" data-testid="btn-prev" onclick="prevPage()">← Prev</button>
    <span id="page-info" data-testid="page-info">Page 1 of 3</span>
    <button class="btn btn-ghost btn-sm" id="btn-next" data-testid="btn-next" onclick="nextPage()">Next →</button>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
const tableData=[
  {name:'Alice',dept:'QA',role:'SDET',salary:'$95,000'},
  {name:'Bob',dept:'Engineering',role:'Backend',salary:'$110,000'},
  {name:'Charlie',dept:'DevOps',role:'SRE',salary:'$105,000'},
  {name:'Diana',dept:'QA',role:'Lead',salary:'$120,000'},
  {name:'Edward',dept:'Engineering',role:'Frontend',salary:'$98,000'},
  {name:'Fatima',dept:'Engineering',role:'Fullstack',salary:'$115,000'},
  {name:'George',dept:'DevOps',role:'Architect',salary:'$130,000'},
  {name:'Helen',dept:'QA',role:'Automation',salary:'$88,000'},
  {name:'Ivan',dept:'Engineering',role:'Backend',salary:'$102,000'},
];
let tableFiltered=[...tableData],tablePage=0,tableAsc=true;
function renderTable(){
  const start=tablePage*3,rows=tableFiltered.slice(start,start+3);
  document.getElementById('table-body').innerHTML=rows.map(r=>`<tr><td>${r.name}</td><td>${r.dept}</td><td>${r.role}</td><td>${r.salary}</td></tr>`).join('');
  document.getElementById('page-info').textContent=`Page ${tablePage+1} of ${Math.ceil(tableFiltered.length/3)}`;
  document.getElementById('btn-prev').disabled=tablePage===0;
  document.getElementById('btn-next').disabled=(tablePage+1)*3>=tableFiltered.length;
}
function filterTable(){const q=document.getElementById('table-search').value.toLowerCase();tableFiltered=tableData.filter(r=>r.name.toLowerCase().includes(q)||r.dept.toLowerCase().includes(q));tablePage=0;renderTable()}
function sortTable(){tableFiltered.sort((a,b)=>tableAsc?a.name.localeCompare(b.name):b.name.localeCompare(a.name));tableAsc=!tableAsc;renderTable()}
function prevPage(){if(tablePage>0){tablePage--;renderTable()}}
function nextPage(){if((tablePage+1)*3<tableFiltered.length){tablePage++;renderTable()}}
renderTable();
</script>
</body>
</html>
