<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hover Menu — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 14 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 14</span>
  <div class="prev-next"><a href="page13.html">← 13</a><a href="page15.html">15 →</a></div>
</div>
<div class="container">
<div class="section" id="s14">
  <div class="section-header">
    <div class="section-num">14</div>
    <div><div class="section-title">Hover Menu</div>
    <div class="section-desc">Hover to reveal submenu — moveToElement / hover()</div></div>
  </div>
  <div class="hover-menu" data-testid="hover-menu">
    <div class="hm-trigger" data-testid="hover-trigger">Hover me ▾</div>
    <div class="hm-dropdown" data-testid="hover-dropdown">
      <a href="#" data-testid="hover-item-1" onclick="setResult('hover-result','Clicked: Action 1');return false">Action 1</a>
      <a href="#" data-testid="hover-item-2" onclick="setResult('hover-result','Clicked: Action 2');return false">Action 2</a>
      <a href="#" data-testid="hover-item-3" onclick="setResult('hover-result','Clicked: Action 3');return false">Action 3</a>
    </div>
  </div>
  <div id="hover-result" data-testid="hover-result" class="result" style="margin-top:8px">Hover the menu and click an item</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

</script>
</body>
</html>
