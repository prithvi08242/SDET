<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cart — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
<style>
.cart-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
@media(max-width:700px){.cart-layout{grid-template-columns:1fr}}
.cart-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;display:flex;gap:14px;align-items:flex-start}
.cart-item+.cart-item{margin-top:10px}
.cart-emoji{font-size:2.2rem;flex-shrink:0;width:52px;height:52px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.cart-info{flex:1}
.cart-name{font-size:14px;font-weight:600}
.cart-cat{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase}
.cart-price{font-size:13px;color:var(--accent2);font-weight:600;margin-top:4px}
.qty-ctrl{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.qty-val{font-size:13px;font-weight:600;min-width:20px;text-align:center}
.cart-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:4px 8px;border-radius:4px}
.cart-remove:hover{color:var(--danger);background:var(--surface2)}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;position:sticky;top:80px}
.summary-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)}
.summary-row:last-of-type{border-bottom:none;font-weight:700;font-size:14px;color:var(--accent2)}
.promo-row{display:flex;gap:8px;margin:12px 0}
.empty-cart{text-align:center;padding:4rem;color:var(--muted)}
.ecom-nav{background:var(--surface2);border-bottom:1px solid var(--border);padding:.5rem 2rem;display:flex;gap:6px;flex-wrap:wrap}
.ecom-nav a{font-size:12px;color:var(--muted);text-decoration:none;padding:4px 12px;border-radius:4px;border:1px solid transparent}
.ecom-nav a:hover,.ecom-nav a.active{background:var(--surface);color:var(--text);border-color:var(--border)}
</style>
</head>
<body>
<header>
  <div>
    <h1>🛍️ TechMart — Cart</h1>
    <p>Review your items before checkout</p>
  </div>
  <div class="badge-row">
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="ecom-nav">
  <a href="ecom-shop.html" data-testid="nav-shop">🏪 Shop</a>
  <a href="ecom-cart.html" class="active" data-testid="nav-cart">🛒 Cart</a>
  <a href="ecom-orders.html" data-testid="nav-orders">📦 My Orders</a>
  <a href="dashboard.html" data-testid="nav-dashboard">← Practice Dashboard</a>
</div>

<div class="container">
  <div id="empty-cart" class="empty-cart" style="display:none" data-testid="empty-cart">
    <div style="font-size:3rem">🛒</div>
    <div style="font-size:16px;font-weight:600;margin:.5rem 0">Your cart is empty</div>
    <a href="ecom-shop.html" class="btn btn-primary" style="margin-top:.5rem;display:inline-block;text-decoration:none">Continue Shopping</a>
  </div>

  <div id="cart-content" class="cart-layout">
    <div>
      <h2 style="font-size:1rem;font-weight:600;margin-bottom:1rem" data-testid="cart-title">Shopping Cart (<span id="cart-item-count">0</span> items)</h2>
      <div id="cart-items" data-testid="cart-items"></div>
      <a href="ecom-shop.html" class="btn btn-ghost btn-sm" style="margin-top:1rem;display:inline-flex;text-decoration:none" data-testid="btn-continue-shopping">← Continue Shopping</a>
    </div>

    <div class="summary-card" data-testid="order-summary">
      <div style="font-size:14px;font-weight:700;margin-bottom:1rem">Order Summary</div>
      <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal" data-testid="summary-subtotal">$0</span></div>
      <div class="summary-row"><span>Shipping</span><span id="summary-shipping" data-testid="summary-shipping">$0</span></div>
      <div class="summary-row"><span>Tax (8%)</span><span id="summary-tax" data-testid="summary-tax">$0</span></div>
      <div class="promo-row">
        <input id="promo-input" type="text" data-testid="promo-input" placeholder="Promo code" style="flex:1"/>
        <button class="btn btn-ghost btn-sm" data-testid="btn-apply-promo" onclick="applyPromo()">Apply</button>
      </div>
      <div id="promo-result" data-testid="promo-result" style="font-size:12px;margin-bottom:8px"></div>
      <div class="summary-row"><span>Total</span><span id="summary-total" data-testid="summary-total">$0</span></div>
      <button class="btn btn-primary" style="width:100%;margin-top:1rem" data-testid="btn-checkout"
        onclick="window.location.href='ecom-checkout.html'">Proceed to Checkout →</button>
      <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px">🔒 Secure checkout</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

let discount=0;
const PROMOS={'SAVE10':10,'TECH20':20,'PLAYWRIGHT':15};

function getCart(){return JSON.parse(sessionStorage.getItem('ap_cart')||'[]')}
function saveCart(c){sessionStorage.setItem('ap_cart',JSON.stringify(c))}

function updateQty(id,delta){
  const cart=getCart();
  const item=cart.find(x=>x.id===id);
  if(!item)return;
  item.qty+=delta;
  if(item.qty<=0)cart.splice(cart.indexOf(item),1);
  saveCart(cart);
  renderCart();
}
function removeItem(id){
  const cart=getCart().filter(x=>x.id!==id);
  saveCart(cart);
  renderCart();
}

function applyPromo(){
  const code=document.getElementById('promo-input').value.trim().toUpperCase();
  const el=document.getElementById('promo-result');
  if(PROMOS[code]){
    discount=PROMOS[code];
    el.style.color='var(--accent2)';
    el.textContent='✅ Promo "'+code+'" applied — '+discount+'% off!';
  } else {
    discount=0;
    el.style.color='var(--danger)';
    el.textContent='❌ Invalid promo code';
  }
  renderSummary();
}

function renderSummary(){
  const cart=getCart();
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const ship=sub>0?(sub>500?0:9.99):0;
  const discounted=sub*(1-discount/100);
  const tax=discounted*0.08;
  const total=discounted+ship+tax;
  document.getElementById('summary-subtotal').textContent='$'+sub.toFixed(2);
  document.getElementById('summary-shipping').textContent=ship===0?'FREE':'$'+ship.toFixed(2);
  document.getElementById('summary-tax').textContent='$'+tax.toFixed(2);
  document.getElementById('summary-total').textContent='$'+total.toFixed(2);
  sessionStorage.setItem('ap_order_total',total.toFixed(2));
}

function renderCart(){
  const cart=getCart();
  const empty=document.getElementById('empty-cart');
  const content=document.getElementById('cart-content');
  if(!cart.length){empty.style.display='block';content.style.display='none';return;}
  empty.style.display='none';content.style.display='grid';

  document.getElementById('cart-item-count').textContent=cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cart-items').innerHTML=cart.map(item=>`
    <div class="cart-item" data-testid="cart-item-${item.id}">
      <div class="cart-emoji">${item.emoji}</div>
      <div class="cart-info">
        <div class="cart-name" data-testid="cart-name-${item.id}">${item.name}</div>
        <div class="cart-cat">${item.cat}</div>
        <div class="cart-price" data-testid="cart-price-${item.id}">$${item.price.toLocaleString()} each</div>
        <div class="qty-ctrl">
          <button class="qty-btn" data-testid="btn-qty-dec-${item.id}" onclick="updateQty('${item.id}',-1)">−</button>
          <span class="qty-val" data-testid="qty-val-${item.id}">${item.qty}</span>
          <button class="qty-btn" data-testid="btn-qty-inc-${item.id}" onclick="updateQty('${item.id}',1)">+</button>
          <span style="font-size:12px;color:var(--muted)">= $${(item.price*item.qty).toFixed(2)}</span>
        </div>
      </div>
      <button class="cart-remove" data-testid="btn-remove-${item.id}" onclick="removeItem('${item.id}')" title="Remove">✕</button>
    </div>`).join('');
  renderSummary();
}
renderCart();
</script>
</body>
</html>
