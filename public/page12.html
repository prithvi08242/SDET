<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shadow DOM — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 12 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 12</span>
  <div class="prev-next"><a href="page11.html">← 11</a><a href="page13.html">13 →</a></div>
</div>
<div class="container">
<div class="section" id="s12">
  <div class="section-header">
    <div class="section-num">12</div>
    <div><div class="section-title">Shadow DOM</div>
    <div class="section-desc">Pierce shadow root — input and button inside custom element</div></div>
  </div>
  <div id="shadow-host-section">
    <div id="shadow-host" data-testid="shadow-host"></div>
    <div id="shadow-result" data-testid="shadow-result" class="result" style="margin-top:8px">No shadow interaction yet</div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
;(()=>{
  const host=document.getElementById('shadow-host');
  const shadow=host.attachShadow({mode:'open'});
  shadow.innerHTML=`
    <style>input{padding:7px 10px;background:#22263a;border:1px solid #2e3250;border-radius:6px;color:#e8eaf6;font-size:13px;margin-right:8px}button{padding:7px 14px;background:#7f8cff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px}</style>
    <input id="shadow-input" type="text" placeholder="Shadow DOM input" data-testid="shadow-input"/>
    <button id="shadow-btn" onclick="document.getElementById('shadow-result').textContent='Shadow DOM interacted: '+this.getRootNode().getElementById('shadow-input').value">Submit Shadow</button>`;
})();
</script>
</body>
</html>
