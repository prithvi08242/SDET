<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dynamic Content — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 06 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 06</span>
  <div class="prev-next"><a href="page05.html">← 05</a><a href="page07.html">07 →</a></div>
</div>
<div class="container">
<div class="section" id="s6">
  <div class="section-header">
    <div class="section-num">06</div>
    <div><div class="section-title">Dynamic Content</div>
    <div class="section-desc">Appear after delay, disappear, text change, counter, inject content</div></div>
  </div>
  <div class="grid-2">
    <div>
      <button class="btn btn-primary btn-sm" onclick="showDelayed()">Show Delayed Element</button>
      <div id="delayed-el" data-testid="delayed-el" style="display:none;margin-top:8px" class="result">✅ I appeared after 2s!</div>
      <div style="margin-top:12px">
        <button id="btn-disappear" class="btn btn-warn btn-sm" data-testid="btn-disappear" onclick="this.style.display='none';setResult('dynamic-result','Element disappeared!')">Click to Disappear</button>
      </div>
    </div>
    <div>
      <button class="btn btn-ghost btn-sm" onclick="changeText()">Change Text</button>
      <div id="dynamic-text" data-testid="dynamic-text" class="result" style="margin-top:8px">Original text</div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:8px">
        <button class="btn btn-success btn-sm" data-testid="btn-increment" onclick="increment()">+1</button>
        <span id="counter-val" data-testid="counter-val" style="font-size:1.2rem;font-weight:700;color:var(--accent)">0</span>
        <button class="btn btn-danger btn-sm" data-testid="btn-decrement" onclick="decrement()">-1</button>
      </div>
    </div>
  </div>
  <div style="margin-top:12px">
    <button class="btn btn-ghost btn-sm" onclick="injectContent()">Inject Dynamic Content</button>
    <div id="injected-area" data-testid="injected-area" class="result" style="margin-top:8px">No content injected yet</div>
  </div>
  <div id="dynamic-result" class="result" style="margin-top:8px;display:none"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
let counterVal=0;
function showDelayed(){const el=document.getElementById('delayed-el');el.style.display='block';el.textContent='⏳ Loading...';setTimeout(()=>el.textContent='✅ I appeared after 2s!',2000)}
function changeText(){const el=document.getElementById('dynamic-text');el.textContent=el.textContent==='Original text'?'✅ Text changed!':'Original text'}
function increment(){document.getElementById('counter-val').textContent=++counterVal}
function decrement(){document.getElementById('counter-val').textContent=--counterVal}
function injectContent(){document.getElementById('injected-area').innerHTML='<strong style="color:var(--accent2)">🎉 Dynamically injected at '+new Date().toLocaleTimeString()+'</strong>'}
</script>
</body>
</html>
