<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stale Element Simulation — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 22 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 22</span>
  <div class="prev-next"><a href="page21.html">← 21</a><a href="page23.html">23 →</a></div>
</div>
<div class="container">
<div class="section" id="s22">
  <div class="section-header">
    <div class="section-num">22</div>
    <div><div class="section-title">Stale Element Simulation</div>
    <div class="section-desc">Element replaced in DOM — previously found reference becomes stale</div></div>
  </div>
  <div id="stale-container" data-testid="stale-container">
    <div id="stale-target" data-testid="stale-target" class="result">Stale target — instance #0</div>
  </div>
  <button class="btn btn-warn btn-sm" style="margin-top:8px" data-testid="btn-replace" onclick="replaceStale()">Replace Element</button>
  <div id="stale-count" style="font-size:12px;color:var(--muted);margin-top:6px">Replaced 0 times</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
let staleCount=0;
function replaceStale(){
  staleCount++;
  const container=document.getElementById('stale-container');
  container.innerHTML=`<div id="stale-target" data-testid="stale-target" style="padding:8px 12px;background:var(--surface2);border:1px solid var(--accent2);border-radius:6px;font-size:13px;color:var(--accent2)">Stale target — instance #${staleCount}</div>`;
  document.getElementById('stale-count').textContent=`Replaced ${staleCount} time(s)`;
}
</script>
</body>
</html>
