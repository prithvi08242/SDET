<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tooltip — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 15 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 15</span>
  <div class="prev-next"><a href="page14.html">← 14</a><a href="page16.html">16 →</a></div>
</div>
<div class="container">
<div class="section" id="s15">
  <div class="section-header">
    <div class="section-num">15</div>
    <div><div class="section-title">Tooltip</div>
    <div class="section-desc">Hover trigger, read tooltip text content</div></div>
  </div>
  <div class="tooltip-wrap" data-testid="tooltip-wrap">
    <button class="btn btn-primary" data-testid="tooltip-target" aria-describedby="tooltip-text">Hover for tooltip</button>
    <div class="tip" id="tooltip-text" data-testid="tooltip-text" role="tooltip">🎯 This is the tooltip text!</div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

</script>
</body>
</html>
