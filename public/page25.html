<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flaky Element — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 25 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 25</span>
  <div class="prev-next"><a href="page24.html">← 24</a><a href="page26.html">26 →</a></div>
</div>
<div class="container">
<div class="section" id="s25">
  <div class="section-header">
    <div class="section-num">25</div>
    <div><div class="section-title">Flaky Element</div>
    <div class="section-desc">Passes or fails ~50/50 — practise retry logic</div></div>
  </div>
  <button class="btn btn-warn" data-testid="btn-flaky" onclick="runFlaky()">Run Flaky Action</button>
  <div id="flaky-result" data-testid="flaky-result" class="result" style="margin-top:8px">Not run yet</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function runFlaky(){
  const pass=Math.random()>0.5;
  const el=document.getElementById('flaky-result');
  el.textContent=pass?'✅ PASS — action succeeded':'❌ FAIL — action failed (retry!)';
  el.className='result '+(pass?'pass':'fail');
}
</script>
</body>
</html>
