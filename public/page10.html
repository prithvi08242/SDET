<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Modal Dialog — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 10 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 10</span>
  <div class="prev-next"><a href="page09.html">← 09</a><a href="page11.html">11 →</a></div>
</div>
<div class="container">
<div class="section" id="s10">
  <div class="section-header">
    <div class="section-num">10</div>
    <div><div class="section-title">Modal Dialog</div>
    <div class="section-desc">Open modal, close via X, button, or overlay click</div></div>
  </div>
  <button class="btn btn-primary" data-testid="btn-open-modal" onclick="document.getElementById('practice-modal').classList.add('open')">Open Modal</button>
  <div id="modal-open-result" data-testid="modal-open-result" class="result" style="margin-top:8px;display:none">Modal was opened then closed</div>
  <div class="modal-overlay" id="practice-modal" data-testid="practice-modal" onclick="closeModalIfOverlay(event)">
    <div class="modal-box">
      <button class="modal-close" data-testid="modal-close-x" onclick="closeModal()">✕</button>
      <h3>Practice Modal</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Close via the X, the button below, or clicking outside.</p>
      <div class="form-group"><label class="lbl">Type something</label>
        <input id="modal-input" type="text" data-testid="modal-input" placeholder="Type here..."/>
      </div>
      <button class="btn btn-primary" data-testid="btn-modal-close" onclick="closeModal()">Close Modal</button>
    </div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function closeModal(){document.getElementById('practice-modal').classList.remove('open');setResult('modal-open-result','Modal was opened then closed')}
function closeModalIfOverlay(e){if(e.target===e.currentTarget)closeModal()}
</script>
</body>
</html>
