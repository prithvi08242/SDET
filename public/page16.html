<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>File Upload — Automation Practice</title>
<link rel="stylesheet" href="css/shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 16 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 16</span>
  <div class="prev-next"><a href="page15.html">← 15</a><a href="page17.html">17 →</a></div>
</div>
<div class="container">
<div class="section" id="s16">
  <div class="section-header">
    <div class="section-num">16</div>
    <div><div class="section-title">File Upload</div>
    <div class="section-desc">Upload a file and assert on the selected file name</div></div>
  </div>
  <input id="file-upload" type="file" data-testid="file-upload" aria-label="File upload"
    onchange="setResult('upload-result','Selected: '+this.files[0].name)"
    style="padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:13px;width:100%"/>
  <div id="upload-result" data-testid="upload-result" class="result" style="margin-top:8px">No file selected</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

</script>
</body>
</html>
