<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Basic Form Elements — Automation Practice</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 01 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 01</span>
  <div class="prev-next"><a href="page02.html">02 →</a></div>
</div>
<div class="container">
<div class="section" id="s1">
  <div class="section-header">
    <div class="section-num">01</div>
    <div><div class="section-title">Basic Form Elements</div>
    <div class="section-desc">Text, email, password, phone, number, textarea — fill and submit</div></div>
  </div>
  <form id="basic-form" onsubmit="handleForm(event)">
    <div class="grid-2">
      <div class="form-group">
        <label class="lbl">Full Name</label>
        <input id="input-name" type="text" name="fullname" placeholder="John Doe" data-testid="input-name" aria-label="Full Name"/>
      </div>
      <div class="form-group">
        <label class="lbl">Email</label>
        <input id="input-email" type="email" name="email" placeholder="john@demo.com" data-testid="input-email" aria-label="Email"/>
      </div>
      <div class="form-group">
        <label class="lbl">Password</label>
        <input id="input-password" type="password" name="password" placeholder="••••••" data-testid="input-password" aria-label="Password"/>
      </div>
      <div class="form-group">
        <label class="lbl">Phone</label>
        <input id="input-phone" type="tel" name="phone" placeholder="+1 555 000 0000" data-testid="input-phone" aria-label="Phone"/>
      </div>
    </div>
    <div class="form-group">
      <label class="lbl">Message</label>
      <textarea id="input-textarea" name="message" placeholder="Type your message..." data-testid="input-textarea" aria-label="Message"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button id="btn-submit" type="submit" class="btn btn-primary" data-testid="btn-submit">Submit</button>
      <button id="btn-reset" type="reset" class="btn btn-ghost" data-testid="btn-reset">Reset</button>
    </div>
    <div id="form-result" class="result" data-testid="form-result">Not submitted yet</div>
  </form>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function handleForm(e){
  e.preventDefault();
  const name=document.getElementById('input-name').value;
  const email=document.getElementById('input-email').value;
  setResult('form-result',name&&email?'✅ Submitted: '+name+' ('+email+')':\`❌ Please fill Name and Email\`);
}
</script>
</body>
</html>
