<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Shop — Automation Practice</title>
<link rel="stylesheet" href="shared.css"/>
<style>
.shop-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:1.5rem}
.shop-toolbar input{flex:1;min-width:200px}
.shop-toolbar select{width:auto;padding:8px 12px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .15s}
.product-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.product-img{width:100%;height:140px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3rem}
.product-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:6px}
.product-name{font-size:13px;font-weight:600;color:var(--text)}
.product-cat{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.product-price{font-size:1rem;font-weight:700;color:var(--accent2)}
.product-rating{font-size:11px;color:var(--warn)}
.product-actions{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px}
.badge-cart{position:relative}
.cart-count{position:absolute;top:-6px;right:-8px;background:var(--danger);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.no-results{text-align:center;padding:3rem;color:var(--muted);font-size:14px}
.ecom-nav{background:var(--surface2);border-bottom:1px solid var(--border);padding:.5rem 2rem;display:flex;gap:6px;flex-wrap:wrap}
.ecom-nav a{font-size:12px;color:var(--muted);text-decoration:none;padding:4px 12px;border-radius:4px;border:1px solid transparent}
.ecom-nav a:hover,.ecom-nav a.active{background:var(--surface);color:var(--text);border-color:var(--border)}
</style>
</head>
<body>
<header>
  <div>
    <h1>🛍️ TechMart — Automation Practice Store</h1>
    <p>E-Commerce Practice · Search · Cart · Checkout · Orders</p>
  </div>
  <div class="badge-row">
    <a href="ecom-cart.html" class="badge badge-cart" data-testid="header-cart-link" style="text-decoration:none;cursor:pointer">
      🛒 Cart <span id="header-cart-count" data-testid="header-cart-count" class="cart-count">0</span>
    </a>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
</header>

<div class="ecom-nav">
  <a href="ecom-shop.html" class="active" data-testid="nav-shop">🏪 Shop</a>
  <a href="ecom-cart.html" data-testid="nav-cart">🛒 Cart</a>
  <a href="ecom-orders.html" data-testid="nav-orders">📦 My Orders</a>
  <a href="dashboard.html" data-testid="nav-dashboard">← Practice Dashboard</a>
</div>

<div class="container">
  <div class="shop-toolbar">
    <input id="search-input" type="text" data-testid="search-input" aria-label="Search products"
      placeholder="🔍  Search products…" oninput="renderProducts()"/>
    <select id="filter-category" data-testid="filter-category" aria-label="Filter by category" onchange="renderProducts()">
      <option value="">All Categories</option>
      <option value="Laptop">Laptops</option>
      <option value="Phone">Phones</option>
      <option value="Audio">Audio</option>
      <option value="Accessory">Accessories</option>
      <option value="Wearable">Wearables</option>
    </select>
    <select id="sort-by" data-testid="sort-by" aria-label="Sort by" onchange="renderProducts()">
      <option value="default">Sort: Default</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="name-asc">Name: A → Z</option>
      <option value="rating">Top Rated</option>
    </select>
  </div>

  <div id="product-grid" class="product-grid" data-testid="product-grid"></div>
  <div id="no-results" class="no-results" style="display:none" data-testid="no-results">
    😕 No products match your search.
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

const PRODUCTS=[
  {id:'p1',name:'ProBook Ultra 15',cat:'Laptop',price:1299,rating:4.5,emoji:'💻',desc:'15" 4K display, Intel i9, 32GB RAM, 1TB SSD'},
  {id:'p2',name:'AirBook Slim 13',cat:'Laptop',price:999,rating:4.7,emoji:'🖥️',desc:'13" OLED, M3 chip, 16GB RAM, 512GB SSD'},
  {id:'p3',name:'WorkStation Pro',cat:'Laptop',price:1799,rating:4.3,emoji:'💻',desc:'17" IPS, RTX 4070, 64GB RAM, 2TB SSD'},
  {id:'p4',name:'Galaxy X20',cat:'Phone',price:899,rating:4.6,emoji:'📱',desc:'6.8" AMOLED, 200MP camera, 5000mAh battery'},
  {id:'p5',name:'Pixel Pure 8',cat:'Phone',price:699,rating:4.4,emoji:'📱',desc:'6.3" pOLED, AI camera, Android 15'},
  {id:'p6',name:'Nova Z Flip',cat:'Phone',price:1099,rating:4.2,emoji:'📳',desc:'Foldable 7.6", Snapdragon 8 Gen 3'},
  {id:'p7',name:'SoundWave Pro',cat:'Audio',price:349,rating:4.8,emoji:'🎧',desc:'ANC headphones, 40hr battery, Hi-Res audio'},
  {id:'p8',name:'BudsX Elite',cat:'Audio',price:149,rating:4.5,emoji:'🎵',desc:'True wireless earbuds, ANC, IPX5'},
  {id:'p9',name:'Studio Speaker',cat:'Audio',price:249,rating:4.6,emoji:'🔊',desc:'360° sound, 24hr battery, multipoint BT'},
  {id:'p10',name:'MechKey RGB',cat:'Accessory',price:129,rating:4.7,emoji:'⌨️',desc:'Mechanical keyboard, Cherry MX, RGB backlit'},
  {id:'p11',name:'TrackMaster Pro',cat:'Accessory',price:79,rating:4.4,emoji:'🖱️',desc:'Ergonomic wireless mouse, 4000 DPI'},
  {id:'p12',name:'4K WebCam',cat:'Accessory',price:199,rating:4.3,emoji:'📷',desc:'4K 30fps, auto-focus, built-in mic ring'},
  {id:'p13',name:'SmartWatch Series 9',cat:'Wearable',price:399,rating:4.6,emoji:'⌚',desc:'Health monitoring, GPS, 18hr battery'},
  {id:'p14',name:'FitBand Pro',cat:'Wearable',price:149,rating:4.3,emoji:'💪',desc:'Heart rate, SpO2, sleep tracking, 14-day'},
  {id:'p15',name:'AR Glasses Lite',cat:'Wearable',price:599,rating:4.0,emoji:'🥽',desc:'Mixed reality, 2hr battery, 110° FOV'},
];

function getCart(){return JSON.parse(sessionStorage.getItem('ap_cart')||'[]')}
function saveCart(c){sessionStorage.setItem('ap_cart',JSON.stringify(c))}
function updateCartBadge(){
  const total=getCart().reduce((s,i)=>s+i.qty,0);
  document.getElementById('header-cart-count').textContent=total;
}

function addToCart(id){
  const p=PRODUCTS.find(x=>x.id===id);
  const cart=getCart();
  const ex=cart.find(x=>x.id===id);
  if(ex)ex.qty++;
  else cart.push({...p,qty:1});
  saveCart(cart);
  updateCartBadge();
  showToast('✅ '+p.name+' added to cart');
}

function stars(r){
  const full=Math.floor(r),half=r%1>=0.5;
  return '★'.repeat(full)+(half?'½':'')+'☆'.repeat(5-full-(half?1:0));
}

function renderProducts(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const cat=document.getElementById('filter-category').value;
  const sort=document.getElementById('sort-by').value;

  let list=PRODUCTS.filter(p=>{
    const matchQ=!q||p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
    const matchCat=!cat||p.cat===cat;
    return matchQ&&matchCat;
  });

  if(sort==='price-asc')list.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc')list.sort((a,b)=>b.price-a.price);
  else if(sort==='name-asc')list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='rating')list.sort((a,b)=>b.rating-a.rating);

  const grid=document.getElementById('product-grid');
  const noRes=document.getElementById('no-results');
  if(!list.length){grid.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';

  grid.innerHTML=list.map(p=>`
    <div class="product-card" data-testid="product-card-${p.id}" data-product-id="${p.id}">
      <div class="product-img" data-testid="product-img-${p.id}">${p.emoji}</div>
      <div class="product-body">
        <div class="product-cat" data-testid="product-cat-${p.id}">${p.cat}</div>
        <div class="product-name" data-testid="product-name-${p.id}">${p.name}</div>
        <div class="product-rating" data-testid="product-rating-${p.id}">${stars(p.rating)} (${p.rating})</div>
        <div style="font-size:12px;color:var(--muted)">${p.desc}</div>
        <div class="product-price" data-testid="product-price-${p.id}">$${p.price.toLocaleString()}</div>
      </div>
      <div class="product-actions">
        <button class="btn btn-primary btn-sm" style="flex:1" data-testid="btn-add-to-cart-${p.id}" onclick="addToCart('${p.id}')">🛒 Add to Cart</button>
        <a href="ecom-cart.html" class="btn btn-ghost btn-sm" data-testid="btn-buy-now-${p.id}" onclick="addToCart('${p.id}')">Buy Now</a>
      </div>
    </div>`).join('');
}

updateCartBadge();
renderProducts();
</script>
</body>
</html>
