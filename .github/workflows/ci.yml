name: Source Code CI
on: 
  push: 
    branches:
      - feature/*
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.19.0'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

  


