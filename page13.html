<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Drag & Drop — Automation Practice</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 13 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 13</span>
  <div class="prev-next"><a href="page12.html">← 12</a><a href="page14.html">14 →</a></div>
</div>
<div class="container">
<div class="section" id="s13">
  <div class="section-header">
    <div class="section-num">13</div>
    <div><div class="section-title">Drag & Drop</div>
    <div class="section-desc">Native HTML5 drag and drop</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div id="drag-source" class="drag-source" draggable="true" data-testid="drag-source"
      ondragstart="event.dataTransfer.setData('text','dragged')">"Drag me"</div>
    <div id="drop-zone" class="drop-zone" data-testid="drop-zone"
      ondragover="event.preventDefault();this.classList.add('over')"
      ondragleave="this.classList.remove('over')"
      ondrop="this.classList.remove('over');this.textContent='✅ Dropped!';setResult('drag-result','Drag and drop successful!')">Drop here</div>
  </div>
  <div id="drag-result" data-testid="drag-result" class="result" style="margin-top:8px">Nothing dropped yet</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

</script>
</body>
</html>
