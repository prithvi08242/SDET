<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Alerts — Automation Practice</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 09 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 09</span>
  <div class="prev-next"><a href="page08.html">← 08</a><a href="page10.html">10 →</a></div>
</div>
<div class="container">
<div class="section" id="s9">
  <div class="section-header">
    <div class="section-num">09</div>
    <div><div class="section-title">Alerts</div>
    <div class="section-desc">Native JS alert(), confirm(), prompt() dialogs</div></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    <button class="btn btn-warn btn-sm" data-testid="btn-alert" onclick="showAlert()">Show Alert</button>
    <button class="btn btn-primary btn-sm" data-testid="btn-confirm" onclick="showConfirm()">Show Confirm</button>
    <button class="btn btn-success btn-sm" data-testid="btn-prompt" onclick="showPrompt()">Show Prompt</button>
  </div>
  <div id="alert-result" data-testid="alert-result" class="result">No interaction yet</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function showAlert(){alert('This is a practice alert!');setResult('alert-result','Alert accepted')}
function showConfirm(){const r=confirm('Do you confirm?');setResult('alert-result','Confirm: '+(r?'OK':'Cancel'))}
function showPrompt(){const r=prompt('Enter your name:');setResult('alert-result',r?'Prompt entered: '+r:'Prompt cancelled')}
</script>
</body>
</html>
