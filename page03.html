<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Checkboxes & Radio Buttons — Automation Practice</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 03 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 03</span>
  <div class="prev-next"><a href="page02.html">← 02</a><a href="page04.html">04 →</a></div>
</div>
<div class="container">
<div class="section" id="s3">
  <div class="section-header">
    <div class="section-num">03</div>
    <div><div class="section-title">Checkboxes & Radio Buttons</div>
    <div class="section-desc">Select all, individual checkboxes, radio groups, reveal-on-check</div></div>
  </div>
  <div class="grid-2">
    <div>
      <label class="check-item" style="margin-bottom:8px">
        <input id="chk-all" type="checkbox" data-testid="chk-all" onchange="toggleAll(this)"/> <strong>Select All</strong>
      </label>
      <div class="check-group">
        <label class="check-item"><input class="chk-opt" type="checkbox" value="A" data-testid="chk-a" onchange="updateCheckResult()"/> Option A</label>
        <label class="check-item"><input class="chk-opt" type="checkbox" value="B" data-testid="chk-b" onchange="updateCheckResult()"/> Option B</label>
        <label class="check-item"><input class="chk-opt" type="checkbox" value="C" data-testid="chk-c" onchange="updateCheckResult()"/> Option C</label>
      </div>
      <div id="chk-result" class="result" data-testid="chk-result" style="margin-top:8px">None selected</div>
    </div>
    <div>
      <div class="check-group">
        <label class="check-item"><input name="radio-group" type="radio" value="one" data-testid="radio-one" onchange="setResult('radio-result','Selected: Choice One')"/> Choice One</label>
        <label class="check-item"><input name="radio-group" type="radio" value="two" data-testid="radio-two" onchange="setResult('radio-result','Selected: Choice Two')"/> Choice Two</label>
        <label class="check-item"><input name="radio-group" type="radio" value="three" data-testid="radio-three" onchange="setResult('radio-result','Selected: Choice Three')"/> Choice Three</label>
      </div>
      <div id="radio-result" class="result" data-testid="radio-result" style="margin-top:8px">None selected</div>
      <div style="margin-top:12px">
        <label class="check-item">
          <input id="chk-reveal" type="checkbox" data-testid="chk-reveal" onchange="document.getElementById('reveal-target').style.display=this.checked?'block':'none'"/>
          Check to reveal hidden text
        </label>
        <div id="reveal-target" data-testid="reveal-target">🎉 Hidden content revealed!</div>
      </div>
    </div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function toggleAll(master){document.querySelectorAll('.chk-opt').forEach(c=>c.checked=master.checked);updateCheckResult()}
function updateCheckResult(){
  const vals=[...document.querySelectorAll('.chk-opt:checked')].map(c=>c.value);
  setResult('chk-result',vals.length?'Selected: '+vals.join(', '):'None selected');
  document.getElementById('chk-all').checked=vals.length===3;
}
</script>
</body>
</html>
