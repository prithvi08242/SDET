<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hidden Elements — Automation Practice</title>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<header>
  <div>
    <h1>🎭 Automation Practice</h1>
    <p>Section 18 of 30 · JavaScript / TypeScript</p>
  </div>
  <div class="badge-row">
    <span class="badge">Playwright</span>
    <span class="badge">Selenium</span>
    <span id="header-user" style="font-size:12px;color:var(--muted)"></span>
    <button class="logout-btn" data-testid="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>
<div class="page-nav">
  <a class="home-link" href="dashboard.html">🏠 Dashboard</a>
  <span style="color:var(--border)">›</span>
  <span style="font-size:12px;color:var(--text)">Section 18</span>
  <div class="prev-next"><a href="page17.html">← 17</a><a href="page19.html">19 →</a></div>
</div>
<div class="container">
<div class="section" id="s18">
  <div class="section-header">
    <div class="section-num">18</div>
    <div><div class="section-title">Hidden Elements</div>
    <div class="section-desc">display:none vs visibility:hidden vs opacity:0</div></div>
  </div>
  <div style="margin-bottom:12px;font-size:13px;color:var(--muted)">Three elements are hidden below in different ways:</div>
  <button class="hidden-btn" id="hidden-display-none" data-testid="hidden-display-none">Hidden (display:none)</button>
  <button class="btn btn-ghost btn-sm" style="visibility:hidden" id="hidden-visibility" data-testid="hidden-visibility">Hidden (visibility:hidden)</button>
  <button class="btn btn-ghost btn-sm" style="opacity:0" id="hidden-opacity" data-testid="hidden-opacity">Hidden (opacity:0)</button>
  <button class="btn btn-primary btn-sm" onclick="document.getElementById('hidden-display-none').style.display='inline-flex';setResult('hidden-result','Hidden element revealed!')">Reveal Hidden Button</button>
  <div id="hidden-result" data-testid="hidden-result" class="result" style="margin-top:8px">3 hidden elements in this section — check page source</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
if(sessionStorage.getItem('ap_auth')!=='1') window.location.href='index.html';
document.getElementById('header-user').textContent='👤 '+(sessionStorage.getItem('ap_user')||'admin');
function doLogout(){sessionStorage.clear();window.location.href='index.html';}
function setResult(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block'}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

</script>
</body>
</html>
